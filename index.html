<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body {
    margin: 0;
    background: #f7e6dc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    padding: 20px;
    box-sizing: border-box;
}

/* Contenedor adaptativo: Fila en PC, Columna en Celular */
.container {
    display: flex;
    flex-direction: column; /* Por defecto para celular */
    align-items: center;
    gap: 30px;
    width: 100%;
    max-width: 800px;
}

/* 🌳 árbol */
.tree {
    position: relative;
    width: 300px;
    height: 350px;
    flex-shrink: 0;
}

.trunk {
    position: absolute;
    bottom: 0;
    left: 140px;
    width: 20px;
    height: 120px;
    background: #6b3e26;
}

/* ❤️ corazones */
.heart {
    position: absolute;
    width: 12px;
    height: 12px;
    transform: rotate(45deg);
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    background: inherit;
    border-radius: 50%;
}

.heart::before { top: -6px; }
.heart::after { left: -6px; }

/* Texto adaptativo */
.text {
    width: 100%;
    max-width: 350px;
    text-align: center; /* Centrado en móvil */
}

.typing {
    font-size: 20px;
    font-weight: bold;
    color: #333;
    line-height: 1.4;
    display: inline; /* Permite que el texto salte de línea correctamente */
    border-right: 2px solid black;
    animation: parpadeo 0.7s infinite;
}

.counter {
    margin-top: 20px;
    color: #555;
    font-size: 16px;
}

/* Animación para la barra de escribir */
@keyframes parpadeo {
    50% { border-color: transparent; }
}

/* 💻 Si la pantalla es grande (Computadora), se pone de lado */
@media (min-width: 768px) {
    .container {
        flex-direction: row;
        justify-content: center;
    }
    .text {
        text-align: left;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="tree" id="tree">
        <div class="trunk"></div>
    </div>

    <div class="text">
        <span class="typing" id="typing"></span>
        <div class="counter" id="counter"></div>
    </div>

</div>

<script>
// 🌳 Generar árbol de corazones
let tree = document.getElementById("tree");

for(let i=0; i<180; i++){
    let y = Math.random() * 240; // Ajustado para que no queden flotando tan arriba del tronco
    let width = (240 - y) * 0.85;

    let x = 144 + (Math.random() - 0.5) * width; // Centrado exacto con el tronco

    let heart = document.createElement("div");
    heart.className = "heart";

    heart.style.top = y + "px";
    heart.style.left = x + "px";
    heart.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;

    tree.appendChild(heart);
}

// ✍️ Texto animado corregido para saltos de línea
let text = "holaaaaaa Sary linda , Sarita bella mi negra bella, te amooooo muchísimo 💕";
let i = 0;
let typingElement = document.getElementById("typing");

function escribir(){
    if(i < text.length){
        typingElement.textContent += text[i];
        i++;
        setTimeout(escribir, 50);
    } else {
        // Quita la barra negra al terminar de escribir
        typingElement.style.borderRight = "none";
    }
}
// Iniciar animación
escribir();

// ⏳ Contador de tiempo
let inicio = new Date("2026-03-06");

function tiempo(){
    let ahora = new Date();
    let diff = ahora - inicio;
    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerHTML = "Llevamos juntos: " + dias + " días 💖";
}

tiempo(); // Ejecutar de inmediato
setInterval(tiempo, 1000 * 60 * 60); // Actualizar cada hora es suficiente
</script>

</body>
</html>
