<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Sarita ❤️</title>

<style>
body {
    margin: 0;
    background: #f7e6dc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden; /* Importante para que los corazones no creen barras de desplazamiento */
    padding: 20px;
    box-sizing: border-box;
}

/* Contenedor adaptativo: Fila en PC, Columna en Celular */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 800px;
    position: relative; /* Para posicionar el lienzo de corazones detrás */
}

/* Lienzo de corazones (detrás del tronco) */
#heartCanvas {
    position: absolute;
    width: 360px;
    height: 380px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1; /* Detrás del texto */
}

/* Tronco (delante del lienzo) */
.trunk {
    position: absolute;
    bottom: 0;
    left: 170px; /* Centrado en el lienzo de 360px */
    width: 20px;
    height: 140px;
    background: #6b3e26;
    border-radius: 10px 10px 4px 4px;
    z-index: 2; /* Delante del lienzo de corazones */
}

/* ❤️ Mini corazones individuales */
.heart {
    position: absolute;
    width: 10px;
    height: 10px;
    transform: rotate(45deg);
    opacity: 0.9;
    transition: all 0.5s ease-out; /* Suavizar el movimiento */
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: inherit;
    border-radius: 50%;
}

.heart::before { top: -5px; }
.heart::after { left: -5px; }

/* Texto adaptativo */
.text {
    width: 100%;
    max-width: 360px;
    text-align: center;
    z-index: 3; /* Al frente de todo */
    background: rgba(247, 230, 220, 0.8); /* Fondo semi-transparente para leer bien */
    border-radius: 10px;
}

.typing {
    font-size: 20px;
    font-weight: bold;
    color: #333;
    line-height: 1.5;
    display: inline;
    border-right: 2px solid black;
    animation: parpadeo 0.7s infinite;
}

.counter {
    margin-top: 25px;
    color: #555;
    font-size: 16px;
    font-weight: 500;
}

@keyframes parpadeo {
    50% { border-color: transparent; }
}

/* Animación de flotado suave para cada corazón */
@keyframes flutter {
    0% { transform: rotate(45deg) scale(0.7) translate(0, 0); }
    50% { transform: rotate(45deg) scale(0.9) translate(-10px, -15px); }
    100% { transform: rotate(45deg) scale(0.7) translate(10px, 15px); }
}

/* Pantallas grandes (Computadora) */
@media (min-width: 768px) {
    .container {
        flex-direction: row;
        justify-content: center;
    }
    .text {
        text-align: left;
    }
}
</style>
</head>

<body>

<div class="container">

    <div id="heartCanvas">
        <div class="trunk"></div>
    </div>

    <div class="text">
        <span class="typing" id="typing"></span>
        <div class="counter" id="counter"></div>
    </div>

</div>

<script>
// --- Configuración del Árbol de Corazón Animado ---
const canvas = document.getElementById("heartCanvas");
const totalCorazones = 250; 
const corazonesArray = [];

// Paleta de colores románticos
const colores = [
    '#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c1', 
    '#ffccd5', '#ff4757', '#ee5253', '#ffbe76', 
    '#ff9f43', '#feca57'
];

// Función para obtener una posición en la silueta del corazón (Ecuación Paramétrica)
function getHeartPosition(t) {
    let heartX = 16 * Math.pow(Math.sin(t), 3);
    let heartY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    
    // Escalar y posicionar en el área del lienzo (Y invertido)
    return {
        x: 180 + (heartX * 10), 
        y: 145 - (heartY * 10)
    };
}

// 1. Crear los corazones y posicionarlos aleatoriamente al inicio
for (let i = 0; i < totalCorazones; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    
    // Posición inicial aleatoria en todo el lienzo para un efecto de enjambre
    heart.style.left = Math.random() * 360 + "px";
    heart.style.top = Math.random() * 380 + "px";
    
    // Color aleatorio
    heart.style.background = colores[Math.floor(Math.random() * colores.length)];
    
    // Guardar información del corazón
    corazonesArray.push({
        element: heart,
        t: Math.random() * 2 * Math.PI, // Su posición angular objetivo
        offset: { // Pequeño desplazamiento aleatorio del objetivo para que no sea perfecto
            x: (Math.random() - 0.5) * 30,
            y: (Math.random() - 0.5) * 30
        }
    });

    canvas.appendChild(heart);
}

// 2. Función de animación de enjambre (atracción al corazón central)
function animateHearts() {
    for (let i = 0; i < corazonesArray.length; i++) {
        let hInfo = corazonesArray[i];
        let targetPos = getHeartPosition(hInfo.t);
        
        // Calcular la posición final con el desplazamiento
        let finalX = targetPos.x + hInfo.offset.x;
        let finalY = targetPos.y + hInfo.offset.y;
        
        // Actualizar la posición del elemento HTML
        hInfo.element.style.left = (finalX - 5) + "px";
        hInfo.element.style.top = (finalY - 5) + "px";
        
        // Aplicar la animación de flotado suave individual (CSS)
        hInfo.element.style.animation = `flutter ${2 + Math.random() * 3}s infinite alternate ease-in-out`;
        hInfo.element.style.animationDelay = `${Math.random() * 2}s`;
    }
}

// Iniciar la animación de atracción (se ejecuta una vez para posicionar)
// Pero los corazones siguen moviéndose suavemente gracias a 'flutter' (CSS)
setTimeout(animateHearts, 100);


// ✍️ Animación de Texto para Sarita
let text = "holaaaaaa Sary linda , Sarita bella mi negra bella, te amooooo muchísimo , eres mi bebé tiquita , eres el Tajín de mi mango 💕";
let index = 0;
let typingElement = document.getElementById("typing");

function escribir() {
    if (index < text.length) {
        typingElement.textContent += text[index];
        index++;
        setTimeout(escribir, 50);
    } else {
        typingElement.style.borderRight = "none";
    }
}
escribir();

// ⏳ Contador preciso desde el 21 de Junio de 2023
// El formato Date toma (Año, Mes-1, Día) -> Junio es mes 5 en JS (0=Enero, 5=Junio)
let inicio = new Date(2023, 5, 21); 

function tiempo() {
    let ahora = new Date();
    let diff = ahora - inicio;
    
    // Cálculos de tiempo
    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    
    document.getElementById("counter").innerHTML = "Llevamos juntos: " + dias + " días 💖";
}

// Inicializar contador
tiempo();
// Actualizar dinámicamente cada hora
setInterval(tiempo, 1000 * 60 * 60);
</script>

</body>
</html>
