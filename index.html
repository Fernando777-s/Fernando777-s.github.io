<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body {
    margin: 0;
    background: #f7e6dc;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
    padding: 20px;
    box-sizing: border-box;
}

/* Contenedor adaptativo: Fila en PC, Columna en Celular */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 800px;
}

/* 🌳 Área del árbol */
.tree {
    position: relative;
    width: 360px;
    height: 380px;
    flex-shrink: 0;
}

/* Tronco con curvas más naturales en la base */
.trunk {
    position: absolute;
    bottom: 0;
    left: 170px;
    width: 20px;
    height: 140px;
    background: #6b3e26;
    border-radius: 10px 10px 4px 4px;
}

/* ❤️ Mini corazones que forman la copa */
.heart {
    position: absolute;
    width: 10px;
    height: 10px;
    transform: rotate(45deg);
    opacity: 0.9;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: inherit;
    border-radius: 50%;
}

.heart::before { top: -5px; }
.heart::after { left: -5px; }

/* Texto adaptativo */
.text {
    width: 100%;
    max-width: 360px;
    text-align: center;
}

.typing {
    font-size: 20px;
    font-weight: bold;
    color: #333;
    line-height: 1.5;
    display: inline;
    border-right: 2px solid black;
    animation: parpadeo 0.7s infinite;
}

.counter {
    margin-top: 25px;
    color: #555;
    font-size: 16px;
    font-weight: 500;
}

@keyframes parpadeo {
    50% { border-color: transparent; }
}

/* Pantallas grandes (Computadora) */
@media (min-width: 768px) {
    .container {
        flex-direction: row;
        justify-content: center;
    }
    .text {
        text-align: left;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="tree" id="tree">
        <div class="trunk"></div>
    </div>

    <div class="text">
        <span class="typing" id="typing"></span>
        <div class="counter" id="counter"></div>
    </div>

</div>

<script>
// 🌳 Algoritmo para esculpir la copa en forma de Corazón Real
let tree = document.getElementById("tree");
const totalCorazones = 220; 

// Paleta de colores románticos (Rosas, Rojos, Naranjas suaves, Amarillos pastel)
const colores = [
    '#ff4d6d', '#ff758f', '#ff8fa3', '#ffb3c1', 
    '#ffccd5', '#ff4757', '#ee5253', '#ffbe76', 
    '#ff9f43', '#feca57'
];

for (let i = 0; i < totalCorazones; i++) {
    // Usamos la fórmula matemática paramétrica del corazón
    let t = Math.random() * 2 * Math.PI;
    
    // Ecuación base del corazón
    let heartX = 16 * Math.pow(Math.sin(t), 3);
    let heartY = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    
    // Dispersión hacia el centro para que no quede vacío por dentro
    let r = Math.random(); 
    heartX *= r;
    heartY *= r;

    // Escalar y posicionar en el área de la copa
    // El centro de la copa estará a X: 180px, Y: 140px
    let x = 180 + (heartX * 9); 
    let y = 145 - (heartY * 9); // Invertido porque en web la 'Y' crece hacia abajo

    let heart = document.createElement("div");
    heart.className = "heart";
    
    // Variación sutil de tamaño para verse más natural
    let scale = 0.7 + Math.random() * 0.6;
    heart.style.transform = `max-width(10px) rotate(45deg) scale(${scale})`;
    
    heart.style.left = (x - 5) + "px";
    heart.style.top = (y - 5) + "px";
    
    // Elegir un color al azar de nuestra paleta romántica
    heart.style.background = colores[Math.floor(Math.random() * colores.length)];

    tree.appendChild(heart);
}

// ✍️ Animación de Texto para Sarita
let text = "holaaaaaa Sary linda , Sarita bella mi negra bella, te amooooo muchísimo , eres mi bebé tiquita , eres el Tajín de mi mango 💕";
let index = 0;
let typingElement = document.getElementById("typing");

function escribir() {
    if (index < text.length) {
        typingElement.textContent += text[index];
        index++;
        setTimeout(escribir, 50);
    } else {
        typingElement.style.borderRight = "none";
    }
}
escribir();

// ⏳ Contador preciso desde el 21 de Junio de 2023
// El formato Date toma (Año, Mes-1, Día) -> Junio es mes 5 en JS (0=Enero, 5=Junio)
let inicio = new Date(2023, 5, 21); 

function tiempo() {
    let ahora = new Date();
    let diff = ahora - inicio;
    
    // Cálculos de tiempo
    let dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    
    document.getElementById("counter").innerHTML = "Llevamos juntos: " + dias + " días 💖";
}

// Inicializar contador
tiempo();
// Actualizar dinámicamente cada hora
setInterval(tiempo, 1000 * 60 * 60);
</script>

</body>
</html>
